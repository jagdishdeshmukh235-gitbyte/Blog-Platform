{% extends "base.html" %}

{% block content %}

<h1 style="color:white; font-size:45px; text-shadow:3px 3px 6px black;">
    User Login
</h1>

<div class="card" style="width:300px; margin:auto; padding:30px;">

<form method="POST">

Email<br>
<input type="text" name="email" 
       style="width:90%; padding:10px; margin:10px; border-radius:5px;"><br>

Password<br>
<input type="password" name="password" 
       style="width:90%; padding:10px; margin:10px; border-radius:5px;"><br>

<button type="submit" 
        style="padding:10px 20px; background:black; color:white; border:none; border-radius:5px;">
    Login
</button>

</form>

</div>

<a href="/" style="color:white; margin-top:20px; display:block;">
    Go Back Home
</a>

{% endblock %}
