<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
background: linear-gradient(to right,#36d1dc,#5b86e5);
font-family: Arial, sans-serif;
text-align:center;
margin-top:120px;
}

h1{
color:white;
font-size:45px;
text-shadow:3px 3px 6px black;
}

form{
background:white;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:red;
}

a{
display:block;
margin-top:20px;
color:white;
font-size:18px;
}

</style>

</head>

<body>

<h1>User Login</h1>

<form method="POST">

Email<br>
<input type="text" name="email"><br>

Password<br>
<input type="password" name="password"><br><br>

<button type="submit">Login</button>

</form>

<a href="/">Go Back Home</a>

</body>
</html>
