<!DOCTYPE html>
<html>
<head>
<title>All Posts</title>

<style>

body{
    background: linear-gradient(to right, #00c6ff, #0072ff);
    font-family: Arial, sans-serif;
    text-align: center;
}

h1{
    color: white;
    margin-top: 30px;
    text-shadow: 2px 2px 5px black;
}

/* Card style */
.post{
    background: white;
    width: 300px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
}

.post h2{
    color: black;
}

.post p{
    color: gray;
}

/* Buttons */
a{
    display: inline-block;
    margin: 5px;
    padding: 8px 15px;
    text-decoration: none;
    color: white;
    background: black;
    border-radius: 5px;
}

a:hover{
    background: red;
}

</style>

</head>

<body>

<h1>All Blog Posts</h1>

{% for post in posts %}

<div class="post">

    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>

    <a href="/edit/{{ post.id }}">Edit</a>
    <a href="/delete/{{ post.id }}">Delete</a>

</div>

{% endfor %}

<br>

<a href="/">Go Back Home</a>

</body>
</html>
