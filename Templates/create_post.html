<!DOCTYPE html>
<html>
<head>
<title>Create Post</title>

<style>
body{
background: linear-gradient(to right,#ff9966,#ff5e62);
text-align:center;
font-family: Arial;
margin-top:100px;
}

form{
background:white;
padding:30px;
width:300px;
margin:auto;
border-radius:10px;
}

input, textarea{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
}

</style>

</head>

<body>

<h1>Create Blog Post</h1>

<form method="POST">

Title<br>
<input type="text" name="title"><br>

Content<br>
<textarea name="content"></textarea><br>

<button type="submit">Post</button>

</form>

</body>
</html>
